name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333

      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ragdb
          POSTGRES_USER: raguser
          POSTGRES_PASSWORD: ragpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Install Postgres client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Wait for services
        run: |
          echo "Waiting for Qdrant..."
          for i in {1..10}; do
            curl -s http://localhost:6333/health && break
            sleep 3
          done

          echo "Waiting for Postgres..."
          for i in {1..10}; do
            pg_isready -h localhost -p 5432 && break
            sleep 3
          done

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$PWD" >> $GITHUB_ENV

      - name: Lint
        run: |
          pip install ruff
          ruff check .

      - name: Run tests
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY || 'dummy_key' }}
          QDRANT_HOST: localhost
          DATABASE_URL: postgresql+asyncpg://raguser:ragpassword@localhost:5432/ragdb
        run: |
          pytest tests/ -v --tb=short

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker images
        run: |
          docker build -f infra/Dockerfile.api -t rag-api:latest .
          docker build -f infra/Dockerfile.ui -t rag-ui:latest .

      - name: Smoke test
        run: |
          docker compose up -d qdrant postgres
          sleep 10
          docker compose up -d api
          sleep 15
          curl -f http://localhost:8000/health || exit 1
          echo "API health check passed"