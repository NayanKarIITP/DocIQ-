services:

  # ── Vector database ──────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: rag_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    # 🔥 Removed healthcheck (causing CI failure)

  # ── Feedback database ────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: rag_postgres
    environment:
      POSTGRES_DB: ragdb
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ragpassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raxxx -d ragdb"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI backend ──────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infra/Dockerfile.api
    container_name: rag_api
    ports:
      - "8000:8000"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      DATABASE_URL: postgresql+asyncpg://raguser:ragpassword@postgres:5432/ragdb
    depends_on:
      - qdrant
      - postgres
    volumes:
      - ./:/app
    restart: unless-stopped

  # ── Streamlit UI ─────────────────────────────────────────────────────────
  ui:
    build:
      context: .
      dockerfile: infra/Dockerfile.ui
    container_name: rag_ui
    ports:
      - "8501:8501"
    environment:
      API_URL: http://api:8000
    depends_on:
      - api
    restart: unless-stopped


volumes:
  qdrant_data:
  postgres_data: